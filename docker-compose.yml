services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: opscopilot
    ports:
      - "5432:5432"

  orchestrator:
    build:
      context: ./orchestrator
    environment:
      OUT_DIR: /app/out
      POLICY_PATH: /app/app/policies/policy.yaml
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/opscopilot
      SQLITE_CHECKPOINT_PATH: /app/out/checkpoints.sqlite
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./orchestrator/out:/app/out

  sample-spring-service:
    build:
      context: ./spring-service
    environment:
      SPRING_PROFILES_ACTIVE: demo
    ports:
      - "8080:8080"
